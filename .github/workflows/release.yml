name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each Mac arch builds NATIVELY (macos-latest is arm64, macos-13 is
          # Intel): the autotools sys-crates (opus/lame/vorbis) compile host-arch
          # objects and cannot cross-compile between Mac architectures.
          - platform: macos-latest
            target: ""
            args: ""
          - platform: macos-13
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS build tools (autotools for the Opus sys-crate)
        if: startsWith(matrix.platform, 'macos')
        run: brew install autoconf automake libtool

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.target }}

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Waver ${{ github.ref_name }}"
          releaseBody: "See the commit history for changes."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install macOS build tools (autotools for the Opus sys-crate)
        run: brew install autoconf automake libtool
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run typecheck
      - run: cargo test --workspace
