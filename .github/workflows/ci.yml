name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust + frontend build/test across all three desktop targets (NFR-3 parity).
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Linux is not a shipping target yet - macOS and Windows only.
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS build tools (autotools for the Opus sys-crate)
        if: matrix.os == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Frontend type-check
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Build Tauri app (debug, no bundle)
        run: cargo build -p waver

  # License / SBOM auditing (spec §9). Kept as its own job so it runs once, fast.
  licenses:
    name: license audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo-deny check
        run: cargo deny check
